<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="5">
  <title>Monitor di Sistema</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 2rem; }
    h1 {color: #2E75B6; }
    .cards { display: flex; gap: 1.5rem; margin-top: 1.5rem; }
    .card { background: white; border-radius: 12px; padding: 1.5rem 2rem; flex: 1;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
    .card h2 { font-size: 1rem; color: #888; margin-bottom: 0.5rem; }
    .card .value { font-size: 2.5rem; font-weight: bold; color: #2E75B6; }
    .card .value.alert {color: #e24b4a; }
    .footer { margin-top: 2rem; color: #aaa; font-size: 0.85rem; }
   </style>
 </head>
<body>
  <h1>Monitor di Sistema</h1>
  <div class="cards">
    <div class="card">
      <h2>CPU</h2>
      <div class="value {% if cpu > 80 %}alert{% endif %}">{{ cpu }}%</div>
    </div>
    <div class="card">
      <h2>RAM</h2>
      <div class="value {% if ram > 80 %}alert{% endif %}">{{ ram }}%</div>
    </div>
    <div class="card">
      <h2>Disco</h2>
      <div class="value {% if disco > 90 %}alert{% endif %}">{{ disco }}%</div>
    </div>
  </div>
  <div class="footer">Ultimo aggiornamento: {{ ora }}</div>
</body>
</html>
